spring.application.name=secure-resource-api

# 1. Database Connection Settings
# Replace 'resource_db' with your actual database name if different
spring.datasource.url=jdbc:mysql://localhost:3306/resource_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=springuser
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate/JPA Properties
# 'update' automatically modifies the schema to match your @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
# Automatically detects the correct SQL dialect for your MySQL version
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Set to 'true' to see the actual SQL being generated in your console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Tells Spring to run data.sql AFTER Hibernate creates the tables
spring.jpa.defer-datasource-initialization=true

# Ensures data.sql is always executed on startup
spring.sql.init.mode=always

logging.level.org.springframework.security=DEBUG

# Import the secret from AWS Secrets Manager
# For local development, you can set up a local AWS Secrets Manager or use environment variables to simulate the secret values.
spring.config.import=optional:aws-secretsmanager:/secret/resourcemanager

# Reference the secret in your JWT service
# The key 'jwt.secret' comes directly from your AWS secret key
# For local development, you can set this environment variable or use a local properties file to provide the value.
resourcemanager.jwt.secret=${resourcemanager.jwt.secret}
spring.cloud.aws.region.static=us-east-2
