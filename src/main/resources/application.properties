spring.application.name=secure-resource-api

# 1. Database Connection Settings
# Replace 'resource_db' with your actual database name if different
spring.datasource.url=jdbc:mysql://localhost:3306/resource_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=springuser
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate/JPA Properties
# 'update' automatically modifies the schema to match your @Entity classes on startup
spring.jpa.hibernate.ddl-auto=update
# Automatically detects the correct SQL dialect for your MySQL version
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Set to 'true' to see the actual SQL being generated in your console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG

# Import the secret from AWS Secrets Manager
spring.config.import=optional:aws-secretsmanager:/secret/resourcemanager, optional:file:.env.local[.properties]

# Reference the secret in your JWT service
# The key 'jwt.secret' comes directly from your AWS secret key
resourcemanager.jwt.secret=${resourcemanager.jwt.secret}
spring.cloud.aws.region.static=us-east-2
